server {
    listen 80;
    server_name sugarclaw.top www.sugarclaw.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sugarclaw.top www.sugarclaw.top;

    ssl_certificate /etc/letsencrypt/live/sugarclaw.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sugarclaw.top/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }
}
